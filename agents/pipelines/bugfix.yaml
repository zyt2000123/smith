name: bugfix
description: Bug fixing pipeline
route: bugfix

# 兜底层：每个节点产出先过 rubric（长度/证据/无错误标记），再过节点自己的 gate
base_gate: rubric

steps:
  - skill: understand
    gate: understanding
  - skill: sde-debug
    gate: root_cause
  - skill: planning
    gate: planning_llm
  - skill: testing-strategy
    gate: test
  - skill: contract-alignment
    gate: contract_alignment
  - skill: change-validation
    gate: validation_llm
  - skill: code-review
    gate: review

backtrack:
  contract-alignment: planning
  change-validation: planning
  code-review: change-validation
  testing-strategy: planning
